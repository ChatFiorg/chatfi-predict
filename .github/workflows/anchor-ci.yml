name: Anchor Build & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

env:
  SOLANA_VERSION: 2.1.15
  ANCHOR_VERSION: 0.32.1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libudev-dev llvm libclang-dev protobuf-compiler libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Force update to latest stable Rust
        run: rustup update stable && rustup default stable && rustc --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Install node dependencies
        run: npm install

      - name: Generate a local keypair for the test validator
        run: solana-keygen new --no-bip39-passphrase -o "$HOME/.config/solana/id.json"

      - name: Run anchor build
        run: anchor build

      - name: Run anchor test
        run: anchor test
